server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Serve static assets
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # React router fallback (optional, useful for SPAs)
        try_files $uri $uri/ /index.html;
    }

    # Custom error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
