name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ig-scraper-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./FrontEnd
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ig-scraper-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.PROD_API_URL }}

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            # Moverse a la carpeta del proyecto en la instancia EC2
            cd /home/${{ secrets.AWS_EC2_USER }}/ig-scraper
            
            # Exportar el nombre de usuario de Docker para usarlo en docker-compose
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            # Descargar la última versión de las imágenes
            docker compose pull
            
            # Reiniciar los contenedores
            docker compose pull
            docker compose down
            docker compose up -d --remove-orphans
